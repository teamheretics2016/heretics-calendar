name: Actualizar Calendario Heretics

on:
  # Se activa cuando subes el Excel a GitHub
  push:
    paths:
      - 'Calendario_deportivo_2026.xlsx'

  # También se puede lanzar manualmente desde GitHub
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Descargar repositorio
        uses: actions/checkout@v4

      - name: Instalar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependencias
        run: pip install openpyxl

      - name: Parsear Excel → events.json
        run: |
          python parser/parse_excel.py \
            Calendario_deportivo_2026.xlsx \
            web/events.json

      - name: Verificar eventos generados
        run: |
          python3 -c "
          import json
          with open('web/events.json') as f:
              events = json.load(f)
          print(f'Total eventos: {len(events)}')
          years = sorted(set(e[\"year\"] for e in events))
          print(f'Años: {years}')
          "

      - name: Commit y push del JSON actualizado
        run: |
          git config user.name "Heretics Bot"
          git config user.email "bot@heretics-calendar.com"
          git add web/events.json
          git diff --staged --quiet || git commit -m "🤖 Calendario actualizado $(date '+%Y-%m-%d %H:%M')"
          git push

      - name: Desplegar en GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./web
          publish_branch: gh-pages
